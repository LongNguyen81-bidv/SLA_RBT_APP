name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Check code formatting
      run: npm run format:check || echo "Prettier formatting check"
      
    - name: Run Linter
      run: npm run lint || echo "Linting skipped or failed"
      
    - name: Run Tests
      run: npm test -- --watchAll=false
      
    - name: Build project
      run: npm run build
